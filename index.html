<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>selfimproj</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tab-bar">
        <button class="tab home-tab active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/>
            </svg>
            <span>Home</span>
        </button>
        <button class="tab skilltree-tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="5" r="2"/>
                <circle cx="5" cy="19" r="2"/>
                <circle cx="19" cy="19" r="2"/>
                <line x1="12" y1="7" x2="5" y2="17"/>
                <line x1="12" y1="7" x2="19" y2="17"/>
                <line x1="7" y1="19" x2="17" y2="19"/>
            </svg>
            <span>Skilltree</span>
        </button>
    </div>
    <div class="page home-page active"><div class="home-ver">v1.2.0</div></div>
    <div class="page skilltree-page">
        <div class="tree-header">
            <h1>Calisthenics Skill Tree <span class="ver">v1.2.0</span></h1>
            <div class="legend">
                <span class="legend-item push">Push</span>
                <span class="legend-item pull">Pull</span>
                <span class="legend-item core">Core</span>
                <span class="legend-item cross">Cross</span>
            </div>
        </div>
        <div class="tree-container">
            <div class="tree-zoom">
                <svg class="tree-svg"></svg>
                <div class="tree-web"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
