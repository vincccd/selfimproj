<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Screen with Home Icon and Button</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="categories-container"></div>
    <div class="category-screen"></div>
    <div class="fitness-screen"></div>
    <div class="tab-bar">
        <button class="mind-btn">
            <svg class="mind-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 8 C7 5 10 4 12 4 C14 4 17 5 17 8 C17 11 15 13 15 15 L15 18 L13 18 L13 15 C12.7 15.2 12.3 15.2 12 15 C11.7 15.2 11.3 15.2 11 15 L11 18 L9 18 L9 15 C9 13 7 11 7 8 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M12 4 L12 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M10 7 L11 8 M11 8 L10 9" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                <path d="M13 7 L14 8 M14 8 L13 9" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                <path d="M9 11 L10 11.5 M10 11.5 L9 12" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                <path d="M14 11 L15 11.5 M15 11.5 L14 12" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
            </svg>
            Mind
        </button>
        <button class="finance-btn">
            <svg class="finance-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <text x="12" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold" fill="none" stroke="currentColor" stroke-width="1.5" text-anchor="middle">$</text>
            </svg>
            Finance
        </button>
        <button class="habits-btn">
            <svg class="habits-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 16 L6 13 L4 15 L9 20 L20 9 L18 7 Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
            Habits
        </button>
        <button class="home-btn">
            <svg class="home-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 4 L3 9 V18 H18 V9 L12 4 Z" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            Home
        </button>
        <button class="fitness-btn">
            <svg class="fitness-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="9" width="4" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <rect x="17" y="9" width="4" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <rect x="6" y="10.5" width="12" height="3" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Fitness
        </button>
        <button class="learning-btn">
            <svg class="learning-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4 H20 V20 H4 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M8 8 H16" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M8 12 H16" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M8 16 H16" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            Learning
        </button>
        <button class="nutrition-btn">
            <svg class="nutrition-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3 C10 3 9 5 9 7 C9 9 10 11 12 11 C14 11 15 9 15 7 C15 5 14 3 12 3 Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <path d="M9 11 C9 15 12 20 12 20 C12 20 15 15 15 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M12 11 L12 20" fill="none" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            Nutrition
        </button>
    </div>
</body>
</html>
